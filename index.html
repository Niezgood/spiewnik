<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Śpiewnik Weselny</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #7a9e7e;
    --sage-light: #a8c5ab;
    --sage-dark: #4e6e52;
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --gold-dark: #9a7a2e;
    --cream: #fdfaf5;
    --white: #ffffff;
    --text: #2c2c2c;
    --text-light: #6b6b6b;
    --shadow: rgba(201,168,76,0.15);
    --font-size: 19px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--cream);
    color: var(--text);
    font-size: var(--font-size);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* GOLD STRIPE */
  .gold-stripe {
    height: 7px;
    background: linear-gradient(90deg,
      transparent 0%, #a07c18 3%, #d4aa3a 15%,
      #f0d96a 35%, #faeea0 50%,
      #f0d96a 65%, #d4aa3a 85%,
      #a07c18 97%, transparent 100%);
    flex-shrink: 0;
  }

  /* HEADER */
  header {
    background: linear-gradient(to right,
      var(--sage) 0%,
      #c8deca 18%,
      var(--white) 36%,
      var(--white) 64%,
      #c8deca 82%,
      var(--sage) 100%
    );
    text-align: center;
    padding: 0.9rem 1.5rem 0.7rem;
    position: relative;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .header-title {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(2.4rem, 8vw, 3.6rem);
    color: var(--gold-dark);
    line-height: 1.1;
    position: relative;
    z-index: 1;
    text-shadow: 0 1px 4px rgba(154,122,46,0.15);
  }
  .header-subtitle {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(1.5rem, 4.5vw, 2.1rem);
    color: var(--sage-dark);
    position: relative;
    z-index: 1;
    margin-top: 0.2rem;
    line-height: 1.2;
  }


  /* CONTROLS BAR */
  .controls {
    background: var(--white);
    border-bottom: 1px solid rgba(201,168,76,0.25);
    padding: 0.65rem 1rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 10px rgba(154,122,46,0.1);
  }
  .search-wrap { flex: 1; position: relative; }
  .search-icon {
    position: absolute;
    left: 0.85rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold-dark);
    font-size: 0.95rem;
    pointer-events: none;
  }
  #search {
    width: 100%;
    padding: 0.6rem 1rem 0.6rem 2.4rem;
    border: 1.5px solid #bbb;
    border-radius: 50px;
    font-size: 1rem;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    outline: none;
    background: var(--white);
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
  #search::placeholder { color: #999; font-style: italic; font-weight: 400; }
  #search { padding-right: 2.2rem; }
  .search-clear {
    display: none;
    position: absolute;
    right: 0.7rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #aaa;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0 0.15rem;
  }
  .search-clear:hover { color: var(--text); }
  .font-controls { display: flex; gap: 0.4rem; align-items: center; }
  .btn-font {
    background: var(--white);
    color: var(--gold-dark);
    border: 1.5px solid rgba(201,168,76,0.5);
    border-radius: 50%;
    width: 44px; height: 44px;
    font-size: 0.95rem;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .btn-font:hover { background: #fdf5e0; }
  .btn-font:active { transform: scale(0.92); }
  #font-size-label {
    font-size: 0.75rem;
    color: var(--text-light);
    font-family: sans-serif;
    text-align: center;
    min-width: 20px;
    font-weight: 600;
  }

  /* BREADCRUMB */
  #breadcrumb {
    display: none;
    align-items: center;
    gap: 0.5rem;
    padding: 0.55rem 1rem;
    background: var(--white);
    border-bottom: 1px solid rgba(201,168,76,0.18);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  #breadcrumb-arrow {
    background: var(--white);
    border: 1.5px solid rgba(201,168,76,0.45);
    cursor: pointer;
    color: var(--gold-dark);
    font-size: 1rem;
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  #breadcrumb-arrow:hover { background: #fdf5e0; }
  #breadcrumb-arrow:active { transform: scale(0.92); }

  #breadcrumb-title {
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    font-style: italic;
    font-weight: 600;
  }

  /* SONG COUNT */
  .song-count {
    text-align: center;
    padding: 0.5rem;
    font-size: 0.85rem;
    color: var(--text);
    font-family: sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* SONG LIST */
  #song-list {
    padding: 0.5rem 0.75rem 3rem;
    width: 100%;
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .song-card {
    background: var(--white);
    border-radius: 4px;
    border: 1px solid rgba(201,168,76,0.3);
    border-left: 3px solid var(--gold);
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.15s, border-left-color 0.2s;
    cursor: pointer;
  }
  .song-card:hover { box-shadow: 0 3px 16px rgba(201,168,76,0.2); transform: translateX(3px); border-left-color: var(--sage); }
  .song-card:active { transform: scale(0.99); }
  .song-header {
    display: flex;
    align-items: center;
    padding: 0.85rem 1rem;
    gap: 0.9rem;
  }
  .song-title-wrap { display: flex; align-items: center; gap: 0.65rem; flex: 1; min-width: 0; }

  .song-title {
    font-size: 1.1em;
    color: var(--text);
    font-weight: 600;
    letter-spacing: 0.2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .song-arrow {
    color: var(--gold-light);
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  /* SONG DETAIL VIEW */
  #song-detail {
    display: none;
    padding: 0.75rem 0.75rem 3rem;
    width: 100%;
    max-width: 680px;
    margin: 0 auto;
  }
  .detail-card {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid rgba(201,168,76,0.28);
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    padding: 1.6rem 1.3rem 2rem;
  }

  .detail-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55em;
    font-weight: 600;
    color: var(--sage-dark);
    text-align: center;
    letter-spacing: 0.5px;
    margin-bottom: 0.5rem;
  }
  .detail-divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 0 auto 1.5rem;
  }
  .song-lyrics {
    white-space: pre-wrap;
    line-height: 1.85;
    color: var(--text);
    font-size: 1.05em;
    font-weight: 600;
  }
  .verse-marker {
    display: block;
    font-family: sans-serif;
    font-size: 0.7em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold-dark);
    margin: 1.4rem 0 0.4rem;
  }
  .chorus-marker {
    display: block;
    font-family: sans-serif;
    font-size: 0.7em;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--sage-dark);
    margin: 1.4rem 0 0.4rem;
  }
  .repeat-block {
    display: inline-block;
    position: relative;
    padding: 0.2rem 0;
    margin: 0.3rem 0;
    overflow: visible;
  }
  .repeat-block::before {
    content: '';
    position: absolute;
    left: var(--bracket-left, 80%);
    top: 0;
    bottom: 0;
    width: 0.5rem;
    border: 2px solid var(--text);
    border-left: none;
    border-radius: 0 5px 5px 0;
  }
  .repeat-block::after {
    content: "×" attr(data-count);
    position: absolute;
    left: calc(var(--bracket-left, 80%) + 1.2rem);
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-light);
    font-size: 1rem;
    display: none;
    font-style: italic;
  }
  .no-results .emoji { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 1.2rem 1rem;
    color: var(--text-light);
    font-size: 0.8rem;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 1px;
    font-style: italic;
    border-top: 1px solid rgba(201,168,76,0.25);
    margin-top: auto;
  }
</style>
</head>
<body>

<div class="gold-stripe"></div>
<header>
  <h1 class="header-title">Śpiewnik Weselny</h1>
  <p class="header-subtitle">Katarzyna &amp; Piotr</p>

</header>
<div class="gold-stripe"></div>

<div class="controls" id="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="search" placeholder="Szukaj piosenki…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="search-clear" id="search-clear" aria-label="Wyczyść wyszukiwanie">✕</button>
  </div>
  <div class="font-controls">
    <button class="btn-font" id="font-down" aria-label="Zmniejsz czcionkę">A−</button>
    <span id="font-size-label">A</span>
    <button class="btn-font" id="font-up" aria-label="Zwiększ czcionkę">A+</button>
  </div>
</div>

<div id="breadcrumb">
  <button id="breadcrumb-arrow" aria-label="Wróć">←</button>
  <span id="breadcrumb-title"></span>
</div>

<div class="song-count" id="song-count"></div>

<div id="song-list"></div>
<div class="no-results" id="no-results">
  <span class="emoji">🎵</span>
  Nie znaleziono piosenki.<br>Spróbuj innego słowa.
</div>

<div id="song-detail">
  <div class="detail-card">
    <div class="detail-title" id="detail-title"></div>
    <div class="detail-divider"></div>
    <div class="song-lyrics" id="detail-lyrics"></div>
  </div>
</div>

<div id="offline-banner" style="display:none;opacity:1;transition:opacity 0.6s;position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#4e6e52,#7a9e7e);color:#fff;padding:0.7rem 1.4rem;border-radius:50px;font-family:sans-serif;font-size:0.82rem;letter-spacing:0.5px;box-shadow:0 4px 16px rgba(0,0,0,0.2);align-items:center;gap:0.5rem;z-index:999;white-space:nowrap;">

// --- State ---
const FONT_PRESETS = [14, 18, 22, 26];
const FONT_LABELS  = ['S', 'M', 'L', 'XL'];
let fontIndex = 1; // default M
let fontSize = FONT_PRESETS[fontIndex];
let currentQuery = '';
let currentView = 'list'; // 'list' | 'song'

// --- Elements ---
const elControls   = document.getElementById('controls');
const elList       = document.getElementById('song-list');
const elDetail     = document.getElementById('song-detail');
const elNoResults  = document.getElementById('no-results');
const elCount      = document.getElementById('song-count');
const elBreadcrumb = document.getElementById('breadcrumb');
const elBcTitle    = document.getElementById('breadcrumb-title');
const elDetailTitle    = document.getElementById('detail-title');
const elDetailLyrics   = document.getElementById('detail-lyrics');
const elSearch     = document.getElementById('search');

// --- Show list view ---
function showList(query, keepInput) {
  currentView = 'list';
  currentQuery = query || '';
  if (!keepInput) elSearch.value = currentQuery;

  // Toggle visibility
  elBreadcrumb.style.display = 'none';
  elList.style.display = 'flex';
  elDetail.style.display = 'none';

  const diacr = s => s.replace(/[ąĄ]/g,'a').replace(/[ćĆ]/g,'c').replace(/[ęĘ]/g,'e')
    .replace(/[łŁ]/g,'l').replace(/[ńŃ]/g,'n').replace(/[óÓ]/g,'o')
    .replace(/[śŚ]/g,'s').replace(/[źŹżŻ]/g,'z');
  const norm = s => diacr(s.replace(/[^a-ząćęłńóśźżA-ZĄĆĘŁŃÓŚŹŻ0-9 ]/g, '').trim());
  const q = norm(currentQuery).toLowerCase();
  const filtered = (q
    ? SONGS.filter(s =>
        norm(s.title).toLowerCase().includes(q) ||
        norm(s.lyrics.replace(/<[^>]+>/g, '')).toLowerCase().includes(q))
    : [...SONGS]).sort((a, b) => norm(a.title).localeCompare(norm(b.title), 'pl'));

  elList.innerHTML = '';

  if (filtered.length === 0) {
    elNoResults.style.display = 'block';
    elCount.textContent = '';
    return;
  }
  elNoResults.style.display = 'none';
  const n = filtered.length;
  elCount.textContent = `${n} ${n === 1 ? 'piosenka' : n < 5 ? 'piosenki' : 'piosenek'}`;

  filtered.forEach((song, i) => {
    const card = document.createElement('div');
    card.className = 'song-card';
    card.innerHTML = `
      <div class="song-header">
        <div class="song-title-wrap">
          <span class="song-title">${song.title}</span>
        </div>
        <span class="song-arrow">❯</span>
      </div>`;
    card.addEventListener('click', () => showSong(song));
    elList.appendChild(card);
  });

  window.scrollTo({ top: 0 });
}

// --- Position repeat brackets next to longest line ---
function positionRepeatBrackets() {
  const lyricsEl = document.getElementById('detail-lyrics');
  if (!lyricsEl) return;
  const cs = window.getComputedStyle(lyricsEl);
  const ctx = document.createElement('canvas').getContext('2d');
  ctx.font = cs.fontWeight + ' ' + cs.fontSize + ' ' + cs.fontFamily;

  document.querySelectorAll('#detail-lyrics .repeat-block').forEach(block => {
    let maxWidth = 0;
    block.textContent.split('\n').forEach(line => {
      const w = ctx.measureText(line).width;
      if (w > maxWidth) maxWidth = w;
    });
    const blockWidth = block.getBoundingClientRect().width;
    const bracketLeft = maxWidth > blockWidth
      ? Math.round(blockWidth) - 2          // tekst się zawija — klamra przy krawędzi
      : Math.round(maxWidth + 12);          // tekst mieści się — klamra za tekstem z odstępem
    block.style.setProperty('--bracket-left', bracketLeft + 'px');
  });
}

// --- Show song detail view ---
function showSong(song) {
  currentView = 'song';

  // Breadcrumb
  elBcTitle.textContent = song.title;
  elBreadcrumb.style.top = elControls.offsetHeight + 'px';
  elBreadcrumb.style.display = 'flex';

  // Content
  elDetailTitle.textContent = song.title;
  elDetailLyrics.innerHTML = song.lyrics;
  document.fonts.ready.then(() => requestAnimationFrame(positionRepeatBrackets));

  // Toggle visibility
  elList.style.display = 'none';
  elNoResults.style.display = 'none';
  elCount.style.display = 'none';
  elDetail.style.display = 'block';

  window.scrollTo({ top: 0 });
}

// --- Back to list ---
function goBack() {
  elCount.style.display = '';
  showList(currentQuery);
}
document.getElementById('breadcrumb-arrow').addEventListener('click', goBack);

// --- Search ---
const elSearchClear = document.getElementById('search-clear');
function updateClearBtn() {
  elSearchClear.style.display = elSearch.value ? 'block' : 'none';
}
elSearch.addEventListener('input', function() {
  if (currentView === 'song') {
    elCount.style.display = '';
  }
  updateClearBtn();
  showList(this.value.trim(), true);
});
elSearchClear.addEventListener('click', function() {
  elSearch.value = '';
  updateClearBtn();
  elSearch.focus();
  if (currentView === 'song') {
    elCount.style.display = '';
  }
  showList('');
});

// --- Font size ---
function applyFontSize() {
  fontSize = FONT_PRESETS[fontIndex];
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
  document.getElementById('font-size-label').textContent = FONT_LABELS[fontIndex];
  if (currentView === 'song') requestAnimationFrame(positionRepeatBrackets);
}
document.getElementById('font-up').addEventListener('click', () => {
  if (fontIndex < FONT_PRESETS.length - 1) { fontIndex++; applyFontSize(); }
});
document.getElementById('font-down').addEventListener('click', () => {
  if (fontIndex > 0) { fontIndex--; applyFontSize(); }
});

// --- Init ---
showList('');
applyFontSize();

// --- Service Worker ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(() => {
    // Show offline-ready banner after first cache
    navigator.serviceWorker.ready.then(() => {
      const banner = document.getElementById('offline-banner');
      if (banner) {
        banner.style.display = 'flex';
        setTimeout(() => { banner.style.opacity = '0'; setTimeout(() => { banner.style.display = 'none'; }, 600); }, 3500);
      }
    });
  }).catch(() => {});
}
</script>
